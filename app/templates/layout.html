<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}VIREX Security{% endblock %}</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Base CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/theme.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/layout.css') }}"
    />

    <!-- Page-specific CSS -->
    {% block stylesheets %}{% endblock %}

    <!-- Theme Manager -->
    <script src="{{ url_for('static', filename='javascript/theme.js') }}"></script>
  </head>

  <body>
    <!-- Main Content -->
    {% block content %}
    <!-- Page content goes here -->
    {% endblock %}

    <!-- Common JavaScript -->
    <script src="{{ url_for('static', filename='javascript/layout.js') }}"></script>

    <!-- Page-specific JavaScript -->
    {% block scripts %}{% endblock %}
  </body>
</html>
