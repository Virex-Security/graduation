<!-- Dobby AI Security Assistant Template -->
<!-- Floating Button -->
<div class="chatbot-fab" id="chatbot-fab" title="Ask Dobby">
  <i class="fa-solid fa-robot"></i>
</div>

<!-- Chat Window -->
<div class="chatbot-window" id="chatbot-window">
  <div class="chat-header">
    <div class="header-left">
      <div class="chat-title">
      
        <span>Dobby</span>
      </div>
    </div>

    <button class="close-chat" id="close-chat" title="Close Chat" color="red">&times;</button>
  </div>

  <div class="chat-messages" id="chat-messages">
    <!-- Messages injected here via chatbot.js -->
  </div>

  <div class="chat-input-area">
    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="Ask Dobby about threats..."
      rows="1"
    ></textarea>

    <button class="send-btn" id="send-btn">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#ffffff"
        stroke-width="2.7"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
