<!-- Dobby AI Security Assistant Template -->
<!-- accessibility-fix: issue-6 - Chatbot FAB and dialog need ARIA attributes -->
<!-- Floating Button -->
<div class="chatbot-fab" id="chatbot-fab" title="Ask Dobby" role="button" tabindex="0" aria-label="Open Dobby AI Security Assistant">
  <i class="fa-solid fa-robot" aria-hidden="true"></i>
</div>

<!-- Chat Window -->
<div class="chatbot-window" id="chatbot-window" role="dialog" aria-modal="true" aria-labelledby="chat-title">
  <div class="chat-header">
    <div class="header-left">
      <div class="chat-title" id="chat-title">
        <span>Dobby</span>
      </div>
    </div>

    <button class="close-chat" id="close-chat" aria-label="Close chat"><span aria-hidden="true">&times;</span></button>
  </div>

  <div class="chat-messages" id="chat-messages" role="log" aria-live="polite" aria-label="Chat conversation">
    <!-- Messages injected here via chatbot.js -->
  </div>

  <div class="chat-input-area">
    <label for="chat-input" class="visually-hidden">Message to Dobby</label>
    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="Ask Dobby about threats..."
      rows="1"
      aria-describedby="chat-hint"
    ></textarea>
    <span id="chat-hint" class="visually-hidden">Press Enter to send</span>

    <button class="send-btn" id="send-btn" aria-label="Send message">
      <svg aria-hidden="true" focusable="false"
        xmlns="http://www.w3.org/2000/svg"
        width="22"
        height="22"
        viewBox="0 0 24 24"
        fill="none"
        stroke="#ffffff"
        stroke-width="2.7"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
<!-- /accessibility-fix -->
