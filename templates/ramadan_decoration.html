<!-- ==================== RAMADAN LANTERNS ==================== -->
<!-- Elegant swinging lanterns — placed inside <nav> before </nav> -->
<div id="ramadan-mode">
    <div class="ramadan-lanterns-wrap">
        <!-- Lantern 1 (Left) -->
        <div class="lantern-container lantern-left">
            <svg class="lantern-svg" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Chain -->
                <line x1="50" y1="0" x2="50" y2="40" class="l-chain" />
                <circle cx="50" cy="40" r="4" class="l-ring" />

                <!-- Top Dome -->
                <path d="M 40 45 L 60 45 L 65 65 L 35 65 Z" class="l-gold" />
                <path d="M 35 65 C 35 60, 65 60, 65 65 L 75 90 L 25 90 Z" class="l-gold" />

                <!-- Glass Body -->
                <path d="M 25 90 L 75 90 L 65 150 L 35 150 Z" class="l-glass" />
                <path d="M 40 90 L 35 150" class="l-frame" />
                <path d="M 60 90 L 65 150" class="l-frame" />

                <!-- Candle/Light -->
                <path d="M 45 140 C 45 120, 50 110, 50 110 C 50 110, 55 120, 55 140 Z" class="l-flame" />

                <!-- Bottom Base -->
                <path d="M 35 150 L 65 150 L 55 170 L 45 170 Z" class="l-gold" />
                <path d="M 40 170 C 40 165, 60 165, 60 170 L 65 180 L 35 180 Z" class="l-gold" />

                <!-- Hanging Crescent/Star -->
                <path d="M 50 180 L 50 190" class="l-chain" />
                <path d="M 48 190 C 43 190, 43 198, 48 198 C 45 198, 45 190, 48 190 Z" class="l-gold crescent-spin" />
            </svg>
        </div>

        <!-- Lantern 2 (Center-Right, smaller and slightly delayed) -->
        <div class="lantern-container lantern-right">
            <svg class="lantern-svg" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Chain -->
                <line x1="50" y1="0" x2="50" y2="30" class="l-chain" />
                <circle cx="50" cy="30" r="3" class="l-ring" />

                <!-- Top Dome -->
                <path d="M 42 34 L 58 34 L 62 50 L 38 50 Z" class="l-gold" />
                <path d="M 38 50 C 38 46, 62 46, 62 50 L 70 70 L 30 70 Z" class="l-gold" />

                <!-- Glass Body -->
                <path d="M 30 70 L 70 70 L 60 120 L 40 120 Z" class="l-glass" />
                <path d="M 42 70 L 38 120" class="l-frame" />
                <path d="M 58 70 L 62 120" class="l-frame" />

                <!-- Candle/Light -->
                <path d="M 46 110 C 46 95, 50 85, 50 85 C 50 85, 54 95, 54 110 Z" class="l-flame" />

                <!-- Bottom Base -->
                <path d="M 40 120 L 60 120 L 52 135 L 48 135 Z" class="l-gold" />
                <path d="M 45 135 C 45 131, 55 131, 55 135 L 58 142 L 42 142 Z" class="l-gold" />
            </svg>
        </div>

        <!-- Lantern 3 (Far Right) -->
        <div class="lantern-container lantern-far-right">
            <svg class="lantern-svg" viewBox="0 0 100 250" xmlns="http://www.w3.org/2000/svg">
                <!-- Chain -->
                <line x1="50" y1="0" x2="50" y2="50" class="l-chain" />
                <circle cx="50" cy="50" r="4" class="l-ring" />

                <!-- Top Dome -->
                <path d="M 40 55 L 60 55 L 65 75 L 35 75 Z" class="l-gold" />
                <path d="M 35 75 C 35 70, 65 70, 65 75 L 75 100 L 25 100 Z" class="l-gold" />

                <!-- Glass Body -->
                <path d="M 25 100 L 75 100 L 65 160 L 35 160 Z" class="l-glass" />
                <path d="M 40 100 L 35 160" class="l-frame" />
                <path d="M 60 100 L 65 160" class="l-frame" />

                <!-- Candle/Light -->
                <path d="M 45 150 C 45 130, 50 120, 50 120 C 50 120, 55 130, 55 150 Z" class="l-flame" />

                <!-- Bottom Base -->
                <path d="M 35 160 L 65 160 L 55 180 L 45 180 Z" class="l-gold" />
                <path d="M 40 180 C 40 175, 60 175, 60 180 L 65 190 L 35 190 Z" class="l-gold" />
            </svg>
        </div>

    </div>
</div>
